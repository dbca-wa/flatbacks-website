apiVersion: apps/v1
kind: Deployment
metadata:
  name: flatbacks-valkey
spec:
  template:
    spec:
      containers:
        - name: flatbacks-valkey
          volumeMounts:
            - name: valkey-config
              mountPath: /etc/valkey
              readOnly: true
      imagePullSecrets:
        - name: dhi-registry-secret-prod
      volumes:
        - name: valkey-config
          configMap:
            name: valkey-configmap-prod
            optional: false
