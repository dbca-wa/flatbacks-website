apiVersion: apps/v1
kind: Deployment
metadata:
  name: flatbacks-valkey
  labels:
    app: flatbacks-valkey
spec:
  selector:
    matchLabels:
      app: flatbacks-valkey
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: flatbacks-valkey
    spec:
      containers:
        - name: flatbacks-valkey
          image: valkey/valkey:9-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: 'Australia/Perth'
            - name: ALLOW_EMPTY_PASSWORD
              value: 'yes'
          command:
            - valkey-server
            - /etc/valkey/valkey.conf
          ports:
            - containerPort: 6379
              name: valkey
          resources:
            requests:
              memory: '32Mi'
              cpu: '10m'
            limits:
              memory: '2Gi'
              cpu: '1'
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: false
            runAsUser: 999
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      tolerations:
        - key: arch
          operator: Equal
          value: arm64
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: arch
                    operator: In
                    values:
                      - arm64
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: Exists
